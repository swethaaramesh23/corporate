<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Stackly</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="preloader">
        <div class="preloader-content">
            <img src="logo1.webp" alt="Stackly Logo" class="preloader-logo">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <main class="auth-page">
        <img src="assets/login_bg.png" alt="Abstract Background" class="auth-bg">

        <div class="auth-card animate-scale">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo" style="justify-content: center;"><img src="logo1.webp"
                        alt="Stackly Logo" style="height: 48px; width: auto;"></a>
            </div>

            <h2>Welcome Back</h2>

            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="password">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--accent-color);">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="remember" style="width: auto;">
                    <label for="remember" style="margin-bottom: 0; font-size: 0.9rem; font-weight: normal;">Remember
                        me</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div class="auth-links"
                style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center; margin-top: 1.5rem;">
                <span>Don't have an account? <a href="signup.html">Sign up</a></span>
                <a href="index.html" style="font-size: 0.85rem; color: #cbd5e1; text-decoration: underline;">&larr; Back
                    to Home</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
