<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Stackly</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="preloader">
        <div class="preloader-content">
            <img src="logo1.webp" alt="Stackly Logo" class="preloader-logo">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <main class="auth-page" style="position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;">
        <img src="assets/login_bg.webp" alt="Background" class="auth-bg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4);">

        <div class="auth-card animate-scale" style="background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 3rem; border-radius: var(--radius-lg); width: 100%; max-width: 450px; box-shadow: var(--shadow-2xl); color: white;">
            <div style="text-align: center; margin-bottom: 2rem;" class="animate-on-scroll">
                <a href="index.html" class="logo" style="justify-content: center;"><img src="logo1.webp"
                        alt="Stackly Logo" style="height: 48px; width: auto;"></a>
            </div>

            <h2 style="text-align: center; margin-bottom: 0.5rem; color: white;" class="animate-on-scroll delay-1">Welcome Back</h2>
            <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;" class="animate-on-scroll delay-2">Sign in to access your enterprise dashboard.</p>

            <form id="authForm">
                <div class="form-group animate-on-scroll delay-3" style="margin-bottom: 1.5rem;">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required style="width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: white; outline: none; font-family: inherit; transition: all 0.3s;" onfocus="this.style.borderColor='var(--primary-accent)'; this.style.background='rgba(255,255,255,0.1)';" onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(255,255,255,0.05)';">
                </div>

                <div class="form-group animate-on-scroll delay-4" style="margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label for="password" style="font-weight: 500;">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--primary-accent);">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: white; outline: none; font-family: inherit; transition: all 0.3s;" onfocus="this.style.borderColor='var(--primary-accent)'; this.style.background='rgba(255,255,255,0.1)';" onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(255,255,255,0.05)';">
                </div>

                <div class="form-group animate-on-scroll delay-5" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
                    <input type="checkbox" id="remember" style="width: auto;">
                    <label for="remember" style="margin-bottom: 0; font-size: 0.9rem; font-weight: normal; color: #cbd5e1;">Remember me</label>
                </div>

                <div class="animate-scale delay-5">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign In</button>
                </div>
            </form>

            <div class="auth-links animate-on-scroll delay-5"
                style="display: flex; flex-direction: column; gap: 0.75rem; align-items: center; margin-top: 2rem;">
                <span style="color: #94a3b8;">Don't have an account? <a href="signup.html" style="color: var(--primary-accent); font-weight: 600;">Sign up</a></span>
                <a href="index.html" style="font-size: 0.875rem; color: #94a3b8; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#94a3b8'">&larr; Back to Home</a>
            </div>
        </div>
    </main>


    <script src="js/main.js"></script>
</body>

</html>
