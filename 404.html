<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Stackly</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="logo1.webp" alt="Stackly Logo"
                    style="height: 32px; width: auto;"></a>

    </header>

    <main class="not-found"
        style="min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 0;">
        <div class="container animate-scale delay-1">
            <h1
                style="font-size: 8rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">
                404</h1>
            <h2 style="font-size: 2.5rem; margin-bottom: 1.5rem; color: var(--text-main);">Oops! Page Not Found</h2>
            <p
                style="margin-bottom: 2.5rem; max-width: 500px; margin-left: auto; margin-right: auto; color: var(--text-muted); font-size: 1.1rem;">
                The page you are looking for might have been removed, had its name changed, or is temporarily
                unavailable.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;" class="animate-scale delay-2">
                <a href="index.html" class="btn btn-primary">Go to Homepage</a>
                <a href="contact.html" class="btn btn-outline">Contact Support</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
